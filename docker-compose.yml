services:
  db:
    image: postgres:16-alpine
    container_name: module8-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: g08_dispute
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      # Auto-run schema + seed on first startup (only if db_data is empty)
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./server/src/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d g08_dispute"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: module8-server
    restart: unless-stopped
    environment:
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@db:5432/g08_dispute
      CLIENT_ORIGIN: http://localhost:8080
      UPLOAD_DIR: uploads
    ports:
      - "4000:4000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: module8-web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  db_data:
  uploads_data:
